# Komodo / Docker Compose stack for tierlistrr.
#
# Env vars (Komodo Environment tab):
#   GROQ_API_KEY=gsk_xxx
#   GROQ_MODEL=llama-3.3-70b-versatile   (optionnel)
services:
  tierlistrr:
    container_name: tierlistrr
    build:
      context: .
      dockerfile: Dockerfile
    image: tierlistrr:latest
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      GROQ_BASE_URL: "${GROQ_BASE_URL:-https://api.groq.com/openai/v1}"
      POLLINATIONS_TOKEN: "${POLLINATIONS_TOKEN:-}"
      # Auth (better-auth). BETTER_AUTH_SECRET is REQUIRED in prod (random string).
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-https://tierlistrr.example.com}"
      # Email OTP delivery (Gmail Workspace: smtp.gmail.com + app password).
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-tierlistrr <you@example.com>}"
    volumes:
      - tierlistrr-data:/data
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tierlistrr.rule=Host(`tierlistrr.example.com`)"
      - "traefik.http.routers.tierlistrr.entrypoints=websecure"
      - "traefik.http.routers.tierlistrr.tls=true"
      - "traefik.http.services.tierlistrr.loadbalancer.server.port=3000"

volumes:
  tierlistrr-data:

networks:
  traefik:
    external: true
