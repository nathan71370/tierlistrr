# Komodo / Docker Compose stack for tierlistrr.
#
# In Komodo: create a Stack pointing at this repo (compose file: compose.yaml).
# Set secrets/options in the Stack's Environment, e.g.:
#   GROQ_API_KEY=gsk_xxx
#   TIERLISTRR_PORT=3000
# Komodo writes those to a .env file that Compose interpolates below.

services:
  tierlistrr:
    container_name: tierlistrr
    build:
      context: .
      dockerfile: Dockerfile
    image: tierlistrr:latest
    restart: unless-stopped
    ports:
      - "${TIERLISTRR_PORT:-3000}:3000"
    environment:
      DATA_DIR: /data
      # AI (optional) — leave GROQ_API_KEY empty to disable the "Générer" button.
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      GROQ_BASE_URL: "${GROQ_BASE_URL:-https://api.groq.com/openai/v1}"
    volumes:
      # Persists the SQLite database AND uploaded images.
      - tierlistrr-data:/data

volumes:
  tierlistrr-data:
