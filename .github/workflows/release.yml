name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The published image tag drops the leading "v" (semver metadata), so
      # v0.1.1 -> ghcr image :0.1.1. Strip it for the pull command below.
      - name: Resolve image version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Docker image for this release:

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.v.outputs.version }}
            ```
